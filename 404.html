<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<!-- Phase 6.57d: block browser auto-translate — it rewrites the brand name. -->
<meta name="google" content="notranslate">
<title>Page not found — Gläserne Leidenschaft</title>
<link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
<style>
  @font-face {
    font-family: 'Cinzel';
    font-style: normal;
    font-weight: 500;
    font-display: swap;
    src: url('/fonts/cinzel-v26-latin-500.woff2') format('woff2');
  }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #faf6ea 0%, #f5f0e3 100%);
    font-family: Georgia, 'Times New Roman', serif; color: #1a1510; text-align: center; padding: 24px;
  }
  .card { max-width: 460px; }
  img { width: 110px; height: auto; margin-bottom: 18px; }
  h1 { font-family: 'Cinzel', Georgia, serif; font-size: 20px; letter-spacing: 3px; text-transform: uppercase; color: #806626; font-weight: 500; margin: 0 0 14px; }
  p { font-size: 15px; line-height: 1.7; color: #3a3026; margin: 0 0 8px; }
  p.de { font-style: italic; opacity: 0.85; }
  a.btn {
    display: inline-block; margin-top: 22px; padding: 12px 32px; border: 1px solid #806626;
    color: #806626; text-decoration: none; font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
  }
  a.btn:hover { background: #806626; color: #f5f0e3; }
</style>
</head>
<body>
  <div class="card">
    <img src="/img/logo.png" alt="Gläserne Leidenschaft" width="373" height="351">
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <p class="de">Die gesuchte Seite existiert nicht oder wurde verschoben.</p>
    <a class="btn" href="/">Return home · Zur Startseite</a>
  </div>
</body>
</html>
